# Sentinel V3 — Nginx Config for Laravel Forge
# In Forge: Sites → your site → Edit Nginx Configuration
# Replace the entire server block content with this.

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    # Forge handles SSL — this block will be auto-updated
    # when you enable SSL in the Forge dashboard.

    location / {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_connect_timeout 10;
        proxy_buffering off;
    }

    access_log off;
    error_log /var/log/nginx/sentinel-error.log;
}
