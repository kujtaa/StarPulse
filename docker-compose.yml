version: "3.8"

services:
  sentinel-central:
    image: python:3.11-slim
    container_name: sentinel-central
    restart: unless-stopped
    ports:
      - "${SENTINEL_PORT:-8765}:8765"
    volumes:
      - ./central:/app/central:ro
      - ./agent:/app/agent:ro
      - sentinel-data:/var/lib/sentinel-central
      - sentinel-config:/etc/sentinel
      - sentinel-logs:/var/log/sentinel
    working_dir: /app
    command: >
      python3 central/server.py --config /etc/sentinel/server.conf
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/api/status')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  sentinel-data:
  sentinel-config:
  sentinel-logs:
